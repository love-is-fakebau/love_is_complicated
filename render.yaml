services:
  - type: web
    name: love-is-complicated
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements_complicated.txt
    startCommand: gunicorn app_complicated:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
